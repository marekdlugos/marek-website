<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{.Title}}</title>

  <meta name="description" content="{{ .Description }}">
  <meta name="keywords" content="{{ delimit .Keywords " " }}">
  <meta name="subject" content="Marek Dlugos Personal Website">
  <meta name="rating" content="General">

  <base href="{{ .Site.BaseURL }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="robots" content="index,follow">

  {{ $options := (dict "targetPath" "css/style.css" "outputStyle" "compressed") }}

  {{ $style := resources.Get "sass/main.scss" | toCSS $options | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}" media="screen">

  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="author" href="humans.txt">
  <link rel="me" href="https://www.facebook.com/marek.dlugos/" type="text/html">
  <link rel="me" href="mailto:hi@marekdlugos.com">

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-36B0M4RPHF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-36B0M4RPHF');
  </script>
  
  <script async src="https://tag.clearbitscripts.com/v1/pk_4494011d9a7d418f46e138cdcbff45fa/tags.js"
    referrerpolicy="strict-origin-when-cross-origin"></script>

    <script>
      window.onscroll = function() {myFunction()};

      function myFunction() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        document.getElementById("myBar").style.width = scrolled + "%";
      }
    </script>

  {{- if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "@id": "https://www.marekdlugos.com/#person",
    "name": "Marek Dlugos",
    "url": "https://www.marekdlugos.com",
    "jobTitle": "AI Solutions & Revenue Growth Consultant",
    "description": "B2B SaaS consultant specializing in product, retention, and revenue growth. Aligning design, engineering, and sales into one execution engine.",
    "knowsAbout": ["B2B SaaS", "AI agents", "business process automation", "revenue growth", "product management", "customer success"],
    "sameAs": [
      "https://www.linkedin.com/in/marekdlugos/",
      "https://www.instagram.com/marekdlugos/",
      "https://www.facebook.com/marek.dlugos"
    ],
    "worksFor": {
      "@type": "Organization",
      "name": "Duvo",
      "url": "https://duvo.com"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Marek Dlugos",
    "url": "https://www.marekdlugos.com",
    "author": { "@id": "https://www.marekdlugos.com/#person" }
  }
  </script>
  {{- end }}
</head>
